      function Reveal({ children, delay = 0, className = '', threshold = 0.5 }) {
        const [isVisible, setIsVisible] = useState(false);
        const ref = useRef(null);
        useEffect(() => {
          const observer = new IntersectionObserver(([entry]) => { setIsVisible(entry.isIntersecting); }, { threshold });
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, [threshold]);
        return (
          <div ref={ref} className={`${className} transition-all duration-700 ease-out transform will-change-transform motion-reduce:transition-none motion-reduce:transform-none ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`} style={{ transitionDelay: `${delay}ms` }}>
            {children}
          </div>
        );
      }

          if (!name || !email || !message) { 
            setStatus('Please complete all fields.'); 
            return; 
          }
          setStatus('Message sent successfully!');
          setTimeout(() => {
            setName('');
            setEmail('');
            setMessage('');
            setStatus('');
          }, 2000);
        }

            </div>
            <div>
              <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="Email*" />
            </div>
            <div>
              <textarea value={message} onChange={(e) => setMessage(e.target.value)} className="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-300" placeholder="Message*" rows="5"></textarea>
            </div>
            <button type="submit" className="w-full px-6 py-3 rounded-lg bg-blue-600 text-white font-semibold hover:bg-blue-700 transition">SEND</button>
          </form>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Landing));
    </script>
  </body>
</html>
